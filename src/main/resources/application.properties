spring.application.name=tutor-link

#Database config
spring.datasource.url = ${SPRING_DATASOURCE_URL}
spring.datasource.username = ${SPRING_DATASOURCE_USERNAME}
spring.datasource.password = ${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:update}
spring.jpa.properties.dialect=org.hibernate.dialect.PostgreSQLDialect

#JWT secret key
security.jwt.secret-key=${JWT_SECRET_KEY}
security.jwt.expiration-time=900000
security.jwt.refresh-token-expiration=604800000
security.refresh.cookie-name=refreshToken
security.refresh.cookie-secure=true

#Mail properties
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SUPPORT_EMAIL}
spring.mail.password=${SUPPORT_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# CORS — comma-separated list of allowed origins
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173}

aws.region=${REGION}
aws.s3.bucket-name=${BUCKET_NAME}
aws.access-key-id=${ACCESS_KEY_ID}
aws.secret-access-key=${ACCESS_KEY_SECRET}

spring.config.import=optional:file:.env[.properties]

# Sentry
sentry.dsn=${SENTRY_DSN:}
sentry.environment=${SPRING_PROFILES_ACTIVE:dev}
sentry.send-default-pii=false


#logging
logging.level.com.tl.tutor_link=INFO

logging.level.org.springframework=INFO
logging.level.org.hibernate=INFO

# Console log format: timestamp, level, logger name (last 36 chars), message
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level [%logger{36}] - %msg%n

spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}