spring.application.name=tutor-link-test

# Testcontainers provides the datasource through @ServiceConnection.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT test values
security.jwt.secret-key=test-secret-key-test-secret-key-test-secret-key-test-secret-key
security.jwt.expiration-time=900000
security.jwt.refresh-token-expiration=604800000
security.refresh.cookie-name=refreshToken
security.refresh.cookie-secure=false

# Mail test values
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=test@example.com
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# CORS test value
app.cors.frontend-origin=http://localhost:5173

# AWS fake test values
aws.region=ap-southeast-2
aws.s3.bucket-name=test-bucket
aws.access-key-id=test-access-key
aws.secret-access-key=test-secret-key

# Do not import local .env during tests
spring.config.import=

# Logging
logging.level.com.tl.tutor_link=DEBUG
logging.level.org.springframework=INFO
logging.level.org.hibernate=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level [%logger{36}] - %msg%n